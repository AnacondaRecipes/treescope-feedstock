{% set name = "treescope" %}
{% set version = "0.1.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/treescope-{{ version }}.tar.gz
  sha256: 20f74656f34ab2d8716715013e8163a0da79bdc2554c16d5023172c50d27ea95

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
    - flit-core >=3.8,<4
  run:
    - python
    - numpy >=1.25.2

test:
  imports:
    - treescope
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://treescope.readthedocs.io/
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  summary: An interactive HTML pretty-printer for ML research in IPython notebooks.
  description: Treescope is an interactive HTML pretty-printer and N-dimensional array ("tensor") visualizer, designed for machine learning and neural networks research in IPython notebooks.
  doc_url: https://treescope.readthedocs.io/
  dev_url: https://github.com/google-deepmind/treescope

extra:
  recipe-maintainers:
    - thewchan
